name: Build All Books

on:
  push:
    branches: [main, gpt/preview]
    paths:
      - 'books/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all books
        run: |
          for book_json in books/*/book.json; do
            echo "Building: $book_json"
            node scripts/generate-book.mjs "$book_json"
          done

      - name: Commit generated books
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add books/*/booklets/book.html books/*/page-text-map.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-build: regenerate book HTML"
            git push
          fi
